# JoshuaStead.github.io

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OOH Schedule Builder</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg-secondary: #f5f5f4; --bg-info: #eff6ff;
    --border: rgba(0,0,0,0.12); --border-secondary: rgba(0,0,0,0.2); --border-info: rgba(59,130,246,0.4);
    --text: #1a1a1a; --text-secondary: #6b7280; --text-tertiary: #9ca3af;
    --text-info: #1d4ed8; --text-warning: #b45309;
    --radius-md: 8px; --radius-lg: 12px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --font-mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1e; --bg-secondary: #2c2c2e; --bg-info: #1e3a5f;
      --border: rgba(255,255,255,0.12); --border-secondary: rgba(255,255,255,0.2); --border-info: rgba(96,165,250,0.4);
      --text: #f2f2f7; --text-secondary: #aeaeb2; --text-tertiary: #636366;
      --text-info: #60a5fa; --text-warning: #fbbf24;
    }
  }
  body { font-family: var(--font); background: var(--bg-secondary); color: var(--text); min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 500; margin-bottom: 0.25rem; }
  .subtitle { font-size: 14px; color: var(--text-secondary); margin-bottom: 2rem; }
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 1rem; }
  .section-title { font-size: 14px; font-weight: 500; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 0.5px solid var(--border); }
  .row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
  .field { display: flex; flex-direction: column; flex: 1; min-width: 140px; }
  .field label, .field-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; display: block; }
  select, input[type=text], input[type=time], input[type=date] {
    width: 100%; padding: 7px 10px; font-size: 13px; font-family: var(--font);
    border: 0.5px solid var(--border-secondary); border-radius: var(--radius-md);
    background: var(--bg); color: var(--text); outline: none;
  }
  select:focus, input:focus { border-color: var(--border-info); box-shadow: 0 0 0 3px rgba(59,130,246,0.12); }
  .day-grid { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; }
  .day-check { display: flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer; color: var(--text); }
  .day-check input { cursor: pointer; }
  .check-label { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-secondary); cursor: pointer; }
  .check-label input { cursor: pointer; }
  .per-day-section { margin-top: 12px; border-top: 0.5px solid var(--border); padding-top: 12px; display: none; }
  .per-day-section.visible { display: block; }
  .per-day-grid { display: flex; flex-direction: column; gap: 5px; }
  .per-day-row { display: flex; align-items: center; gap: 10px; padding: 6px 8px; border: 0.5px solid var(--border); border-radius: var(--radius-md); font-size: 13px; }
  .per-day-row.closed-day { opacity: 0.4; }
  .per-day-name { min-width: 36px; font-size: 13px; color: var(--text); }
  .per-day-closed { font-size: 12px; color: var(--text-tertiary); font-style: italic; }
  .per-day-times { display: flex; align-items: center; gap: 8px; flex: 1; flex-wrap: wrap; }
  .per-day-times label { font-size: 11px; color: var(--text-secondary); white-space: nowrap; }
  .per-day-times input[type=time] { width: 110px; font-size: 12px; padding: 3px 6px; }
  .holiday-list { display: flex; flex-direction: column; gap: 4px; margin-top: 8px; }
  .holiday-item { border: 0.5px solid var(--border); border-radius: var(--radius-md); overflow: hidden; }
  .holiday-row { display: flex; align-items: center; gap: 10px; padding: 7px 10px; cursor: pointer; font-size: 13px; user-select: none; }
  .holiday-row:hover { background: var(--bg-secondary); }
  .holiday-item.selected .holiday-row { background: var(--bg-info); color: var(--text-info); }
  .holiday-item input[type=checkbox] { margin: 0; flex-shrink: 0; cursor: pointer; }
  .holiday-name { flex: 1; }
  .holiday-default-date { font-size: 11px; color: var(--text-tertiary); white-space: nowrap; }
  .holiday-item.selected .holiday-default-date { color: var(--text-info); opacity: 0.7; }
  .date-editor { padding: 8px 10px 10px; border-top: 0.5px solid var(--border); background: var(--bg-secondary); display: none; }
  .holiday-item.selected .date-editor { display: block; }
  .date-editor-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .date-editor label { font-size: 11px; color: var(--text-secondary); white-space: nowrap; }
  .date-editor input[type=date] { font-size: 12px; padding: 3px 6px; width: auto; flex: 1; min-width: 130px; }
  .range-toggle { font-size: 11px; color: var(--text-info); cursor: pointer; background: none; border: none; padding: 0; text-decoration: underline; white-space: nowrap; font-family: var(--font); }
  .remove-btn { background: none; border: none; cursor: pointer; font-size: 14px; color: var(--text-tertiary); padding: 0 2px; line-height: 1; flex-shrink: 0; }
  .remove-btn:hover { color: #dc2626; }
  .select-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; flex-wrap: wrap; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 99px; background: var(--bg-info); color: var(--text-info); font-weight: 500; }
  .month-divider { font-size: 11px; font-weight: 500; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.06em; padding: 10px 2px 4px; }
  .output-box { background: var(--bg-secondary); border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 1rem; font-family: var(--font-mono); font-size: 13px; line-height: 1.9; white-space: pre-wrap; color: var(--text); min-height: 80px; }
  .empty-state { font-size: 13px; color: var(--text-tertiary); font-style: italic; }
  .warning-note { margin-top: 12px; font-size: 12px; color: var(--text-warning); }
  .btn { padding: 7px 16px; font-size: 13px; font-family: var(--font); border: 0.5px solid var(--border-secondary); border-radius: var(--radius-md); background: transparent; color: var(--text); cursor: pointer; }
  .btn:hover { background: var(--bg-secondary); }
  .btn-primary { background: var(--bg-info); color: var(--text-info); border-color: var(--border-info); }
  .btn-primary:hover { opacity: 0.85; }
  .output-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .output-header span { font-size: 14px; font-weight: 500; }
  .btn-row { display: flex; gap: 8px; margin-top: 12px; }
</style>
</head>
<body>
<div class="container">
  <h1>OOH Schedule Builder</h1>
  <p class="subtitle">Generate out-of-hours upload schedules</p>

  <div class="card">
    <div class="section-title">Territory and hours</div>
    <div class="row">
      <div class="field">
        <label>Territory</label>
        <select id="territory" onchange="loadHolidays()">
          <option value="us">United States</option>
          <option value="uk">United Kingdom</option>
          <option value="ca">Canada</option>
        </select>
      </div>
      <div class="field">
        <label>Default open time</label>
        <input type="time" id="defaultOpen" value="09:00" onchange="renderPerDay()" />
      </div>
      <div class="field">
        <label>Default close time</label>
        <input type="time" id="defaultClose" value="17:00" onchange="renderPerDay()" />
      </div>
    </div>
    <span class="field-label">Working days</span>
    <div class="day-grid" id="dayGrid"></div>
    <label class="check-label">
      <input type="checkbox" id="perDayToggle" onchange="togglePerDay()" />
      Set different hours per day
    </label>
    <div class="per-day-section" id="perDaySection">
      <div class="per-day-grid" id="perDayGrid"></div>
    </div>
  </div>

  <div class="card">
    <div class="section-title">Select holidays</div>
    <div class="select-row">
      <button class="btn" onclick="selectAll()">Select all</button>
      <button class="btn" onclick="clearAll()">Clear all</button>
      <span class="badge" id="countBadge">0 selected</span>
      <label class="check-label" style="margin-left:auto;">
        <input type="checkbox" id="show2027" onchange="renderHolidays()" />
        Include 2027 holidays
      </label>
    </div>
    <div class="holiday-list" id="holidayList"></div>
  </div>

  <div class="card">
    <div class="section-title">Custom holiday</div>
    <div class="row" style="margin-bottom:8px;">
      <div class="field">
        <label>Holiday name</label>
        <input type="text" id="customName" placeholder="e.g. Company closure" />
      </div>
      <div class="field">
        <label>Date</label>
        <input type="date" id="customDate" />
      </div>
    </div>
    <button class="btn" onclick="addCustom()">Add custom holiday</button>
  </div>

  <div>
    <div class="output-header">
      <span>Generated schedule</span>
      <button class="btn btn-primary" onclick="generate()">Generate</button>
    </div>
    <div class="output-box" id="output"><span class="empty-state">Select holidays above and click Generate.</span></div>
    <div class="btn-row">
      <button class="btn" onclick="copyOutput()">Copy to clipboard</button>
    </div>
  </div>
</div>

<script>
const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
let customHolidays = [], selectedHolidays = new Set(), holidayOverrides = {}, dayOverrides = {};

// All dates hardcoded and verified against official sources for accuracy.
// Observed dates used where holiday falls on a weekend.
const HOLIDAYS = {
  us: {
    2026: [
      { month: 0,  name: "Martin Luther King Jr. Day",  date: "Mon 19 Jan 2026",  iso: "2026-01-19" },
      { month: 1,  name: "Presidents' Day",              date: "Mon 16 Feb 2026",  iso: "2026-02-16" },
      { month: 4,  name: "Memorial Day",                 date: "Mon 25 May 2026",  iso: "2026-05-25" },
      { month: 5,  name: "Juneteenth",                   date: "Fri 19 Jun 2026",  iso: "2026-06-19" },
      { month: 6,  name: "Independence Day",             date: "Fri 3 Jul 2026 (observed)", iso: "2026-07-03" },
      { month: 8,  name: "Labor Day",                    date: "Mon 7 Sep 2026",   iso: "2026-09-07" },
      { month: 9,  name: "Columbus Day",                 date: "Mon 12 Oct 2026",  iso: "2026-10-12" },
      { month: 10, name: "Veterans Day",                 date: "Wed 11 Nov 2026",  iso: "2026-11-11" },
      { month: 10, name: "Thanksgiving Day",             date: "Thu 26 Nov 2026",  iso: "2026-11-26" },
      { month: 11, name: "Christmas Day",                date: "Fri 25 Dec 2026",  iso: "2026-12-25" },
      { month: 0,  name: "New Year's Day",               date: "Fri 1 Jan 2027",   iso: "2027-01-01" },
    ],
    2027: [
      { month: 0,  name: "Martin Luther King Jr. Day",  date: "Mon 18 Jan 2027",  iso: "2027-01-18" },
      { month: 1,  name: "Presidents' Day",              date: "Mon 15 Feb 2027",  iso: "2027-02-15" },
      { month: 4,  name: "Memorial Day",                 date: "Mon 31 May 2027",  iso: "2027-05-31" },
      { month: 5,  name: "Juneteenth",                   date: "Fri 18 Jun 2027 (observed)", iso: "2027-06-18" },
      { month: 6,  name: "Independence Day",             date: "Mon 5 Jul 2027 (observed)", iso: "2027-07-05" },
      { month: 8,  name: "Labor Day",                    date: "Mon 6 Sep 2027",   iso: "2027-09-06" },
      { month: 9,  name: "Columbus Day",                 date: "Mon 11 Oct 2027",  iso: "2027-10-11" },
      { month: 10, name: "Veterans Day",                 date: "Thu 11 Nov 2027",  iso: "2027-11-11" },
      { month: 10, name: "Thanksgiving Day",             date: "Thu 25 Nov 2027",  iso: "2027-11-25" },
      { month: 11, name: "Christmas Day",                date: "Fri 24 Dec 2027 (observed)", iso: "2027-12-24" },
      { month: 0,  name: "New Year's Day",               date: "Sat 1 Jan 2028",   iso: "2028-01-01" },
    ]
  },
  uk: {
    2026: [
      { month: 3,  name: "Good Friday",                  date: "Fri 3 Apr 2026",   iso: "2026-04-03" },
      { month: 3,  name: "Easter Monday",                date: "Mon 6 Apr 2026",   iso: "2026-04-06" },
      { month: 4,  name: "Early May Bank Holiday",       date: "Mon 4 May 2026",   iso: "2026-05-04" },
      { month: 4,  name: "Spring Bank Holiday",          date: "Mon 25 May 2026",  iso: "2026-05-25" },
      { month: 7,  name: "Summer Bank Holiday",          date: "Mon 31 Aug 2026",  iso: "2026-08-31" },
      { month: 11, name: "Christmas Day",                date: "Fri 25 Dec 2026",  iso: "2026-12-25" },
      { month: 11, name: "Boxing Day",                   date: "Mon 28 Dec 2026 (substitute)", iso: "2026-12-28" },
      { month: 0,  name: "New Year's Day",               date: "Fri 1 Jan 2027",   iso: "2027-01-01" },
    ],
    2027: [
      { month: 2,  name: "Good Friday",                  date: "Fri 26 Mar 2027",  iso: "2027-03-26" },
      { month: 2,  name: "Easter Monday",                date: "Mon 29 Mar 2027",  iso: "2027-03-29" },
      { month: 4,  name: "Early May Bank Holiday",       date: "Mon 3 May 2027",   iso: "2027-05-03" },
      { month: 4,  name: "Spring Bank Holiday",          date: "Mon 31 May 2027",  iso: "2027-05-31" },
      { month: 7,  name: "Summer Bank Holiday",          date: "Mon 30 Aug 2027",  iso: "2027-08-30" },
      { month: 11, name: "Christmas Day",                date: "Mon 27 Dec 2027 (substitute)", iso: "2027-12-27" },
      { month: 11, name: "Boxing Day",                   date: "Tue 28 Dec 2027 (substitute)", iso: "2027-12-28" },
      { month: 0,  name: "New Year's Day",               date: "Sat 1 Jan 2028",   iso: "2028-01-01" },
    ]
  },
  ca: {
    2026: [
      { month: 1,  name: "Family Day",                   date: "Mon 16 Feb 2026",  iso: "2026-02-16" },
      { month: 3,  name: "Good Friday",                  date: "Fri 3 Apr 2026",   iso: "2026-04-03" },
      { month: 4,  name: "Victoria Day",                 date: "Mon 18 May 2026",  iso: "2026-05-18" },
      { month: 6,  name: "Canada Day",                   date: "Wed 1 Jul 2026",   iso: "2026-07-01" },
      { month: 7,  name: "Civic Holiday",                date: "Mon 3 Aug 2026",   iso: "2026-08-03" },
      { month: 8,  name: "Labour Day",                   date: "Mon 7 Sep 2026",   iso: "2026-09-07" },
      { month: 8,  name: "National Day for Truth & Reconciliation", date: "Wed 30 Sep 2026", iso: "2026-09-30" },
      { month: 9,  name: "Thanksgiving Day",             date: "Mon 12 Oct 2026",  iso: "2026-10-12" },
      { month: 10, name: "Remembrance Day",              date: "Wed 11 Nov 2026",  iso: "2026-11-11" },
      { month: 11, name: "Christmas Day",                date: "Fri 25 Dec 2026",  iso: "2026-12-25" },
      { month: 11, name: "Boxing Day",                   date: "Mon 28 Dec 2026 (substitute)", iso: "2026-12-28" },
      { month: 0,  name: "New Year's Day",               date: "Fri 1 Jan 2027",   iso: "2027-01-01" },
    ],
    2027: [
      { month: 1,  name: "Family Day",                   date: "Mon 15 Feb 2027",  iso: "2027-02-15" },
      { month: 2,  name: "Good Friday",                  date: "Fri 26 Mar 2027",  iso: "2027-03-26" },
      { month: 4,  name: "Victoria Day",                 date: "Mon 24 May 2027",  iso: "2027-05-24" },
      { month: 6,  name: "Canada Day",                   date: "Thu 1 Jul 2027",   iso: "2027-07-01" },
      { month: 7,  name: "Civic Holiday",                date: "Mon 2 Aug 2027",   iso: "2027-08-02" },
      { month: 8,  name: "Labour Day",                   date: "Mon 6 Sep 2027",   iso: "2027-09-06" },
      { month: 8,  name: "National Day for Truth & Reconciliation", date: "Thu 30 Sep 2027", iso: "2027-09-30" },
      { month: 9,  name: "Thanksgiving Day",             date: "Mon 11 Oct 2027",  iso: "2027-10-11" },
      { month: 10, name: "Remembrance Day",              date: "Thu 11 Nov 2027",  iso: "2027-11-11" },
      { month: 11, name: "Christmas Day",                date: "Mon 27 Dec 2027 (substitute)", iso: "2027-12-27" },
      { month: 11, name: "Boxing Day",                   date: "Tue 28 Dec 2027 (substitute)", iso: "2027-12-28" },
      { month: 0,  name: "New Year's Day",               date: "Sat 1 Jan 2028",   iso: "2028-01-01" },
    ]
  }
};

const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function getDefaultClose() { return document.getElementById('defaultClose').value; }
function getDefaultOpen() { return document.getElementById('defaultOpen').value; }
function isDayActive(i) { const cb = document.getElementById('day-'+i); return cb ? cb.checked : false; }
function getActiveDays() { return DAYS.map((d,i) => isDayActive(i) ? i : null).filter(i => i !== null); }
function show2027() { return document.getElementById('show2027').checked; }

function getAllHolidays() {
  const t = document.getElementById('territory').value;
  const h2026 = HOLIDAYS[t][2026].map(h => ({...h, year: 2026}));
  const h2027 = show2027() ? HOLIDAYS[t][2027].map(h => ({...h, year: 2027})) : [];
  return [...h2026, ...h2027, ...customHolidays];
}

function initDays() {
  const grid = document.getElementById('dayGrid');
  grid.innerHTML = '';
  DAYS.forEach((d, i) => {
    const label = document.createElement('label');
    label.className = 'day-check';
    const cb = document.createElement('input');
    cb.type = 'checkbox'; cb.id = 'day-'+i; cb.checked = i < 5;
    cb.onchange = () => { if (document.getElementById('perDayToggle').checked) renderPerDay(); };
    label.appendChild(cb); label.appendChild(document.createTextNode(d));
    grid.appendChild(label);
  });
}

function togglePerDay() {
  const show = document.getElementById('perDayToggle').checked;
  document.getElementById('perDaySection').classList.toggle('visible', show);
  if (show) renderPerDay();
}

function renderPerDay() {
  const grid = document.getElementById('perDayGrid');
  grid.innerHTML = '';
  DAYS.forEach((d, i) => {
    const active = isDayActive(i), override = dayOverrides[i] || {};
    const row = document.createElement('div');
    row.className = 'per-day-row' + (active ? '' : ' closed-day');
    const name = document.createElement('span');
    name.className = 'per-day-name'; name.textContent = d;
    row.appendChild(name);
    if (!active) {
      const closed = document.createElement('span');
      closed.className = 'per-day-closed'; closed.textContent = 'Closed';
      row.appendChild(closed);
    } else {
      const times = document.createElement('div');
      times.className = 'per-day-times';
      const openLabel = document.createElement('label'); openLabel.textContent = 'Open';
      const openInput = document.createElement('input');
      openInput.type = 'time'; openInput.value = override.open || getDefaultOpen();
      openInput.onchange = e => { if (!dayOverrides[i]) dayOverrides[i]={}; dayOverrides[i].open=e.target.value; };
      const closeLabel = document.createElement('label'); closeLabel.textContent = 'Close';
      const closeInput = document.createElement('input');
      closeInput.type = 'time'; closeInput.value = override.close || getDefaultClose();
      closeInput.onchange = e => { if (!dayOverrides[i]) dayOverrides[i]={}; dayOverrides[i].close=e.target.value; };
      times.appendChild(openLabel); times.appendChild(openInput);
      times.appendChild(closeLabel); times.appendChild(closeInput);
      row.appendChild(times);
    }
    grid.appendChild(row);
  });
}

function fmtTime(val) {
  if (!val) return '';
  const [h, m] = val.split(':'); const hour = parseInt(h);
  const ampm = hour >= 12 ? 'pm' : 'am'; const h12 = hour%12===0 ? 12 : hour%12;
  return m==='00' ? `${h12}${ampm}` : `${h12}:${m}${ampm}`;
}
function getCloseForDay(i) { return fmtTime((dayOverrides[i] && dayOverrides[i].close) || getDefaultClose()); }
function getOpenForDay(i) { return fmtTime((dayOverrides[i] && dayOverrides[i].open) || getDefaultOpen()); }

function loadHolidays() { selectedHolidays.clear(); holidayOverrides = {}; renderHolidays(); }
function getHolidayKey(h) { return h.iso || h.name; }

function renderHolidays() {
  const allHolidays = getAllHolidays();
  const list = document.getElementById('holidayList');
  list.innerHTML = '';
  let lastMonthKey = null;

  allHolidays.forEach(h => {
    const monthKey = h.year ? `${h.year}-${h.month}` : `custom-${h.month}`;
    if (monthKey !== lastMonthKey) {
      const div = document.createElement('div');
      div.className = 'month-divider';
      div.textContent = h.year ? `${MONTH_NAMES[h.month]} ${h.year}` : MONTH_NAMES[h.month];
      list.appendChild(div);
      lastMonthKey = monthKey;
    }

    const key = getHolidayKey(h), isSelected = selectedHolidays.has(key);
    const override = holidayOverrides[key] || {};
    const startVal = override.start || h.iso || '';
    const endVal = override.end || '', isRange = override.isRange || false;

    const item = document.createElement('div');
    item.className = 'holiday-item' + (isSelected ? ' selected' : '');
    const row = document.createElement('div');
    row.className = 'holiday-row';
    row.innerHTML = `<input type="checkbox" ${isSelected ? 'checked' : ''} /><span class="holiday-name">${h.name}</span><span class="holiday-default-date">${h.date}</span>${h.custom ? `<button class="remove-btn" title="Remove">&#x2715;</button>` : ''}`;

    row.querySelector('input[type=checkbox]').onclick = e => {
      e.stopPropagation();
      if (selectedHolidays.has(key)) selectedHolidays.delete(key); else selectedHolidays.add(key);
      renderHolidays();
    };
    row.onclick = e => {
      if (e.target.tagName==='INPUT' || e.target.classList.contains('remove-btn')) return;
      if (selectedHolidays.has(key)) selectedHolidays.delete(key); else selectedHolidays.add(key);
      renderHolidays();
    };
    if (h.custom) {
      row.querySelector('.remove-btn').onclick = e => {
        e.stopPropagation();
        customHolidays = customHolidays.filter(c => c.name !== h.name);
        selectedHolidays.delete(key); delete holidayOverrides[key]; renderHolidays();
      };
    }

    const editor = document.createElement('div');
    editor.className = 'date-editor';
    if (isSelected) {
      const editorRow = document.createElement('div');
      editorRow.className = 'date-editor-row';
      const startLabel = document.createElement('label'); startLabel.textContent = isRange ? 'From' : 'Date';
      const startInput = document.createElement('input');
      startInput.type = 'date'; startInput.value = startVal;
      startInput.onclick = e => e.stopPropagation();
      startInput.onchange = e => { if (!holidayOverrides[key]) holidayOverrides[key]={}; holidayOverrides[key].start=e.target.value; holidayOverrides[key].isRange=isRange; };
      editorRow.appendChild(startLabel); editorRow.appendChild(startInput);
      if (isRange) {
        const endLabel = document.createElement('label'); endLabel.textContent = 'To';
        const endInput = document.createElement('input');
        endInput.type = 'date'; endInput.value = endVal;
        endInput.onclick = e => e.stopPropagation();
        endInput.onchange = e => { if (!holidayOverrides[key]) holidayOverrides[key]={}; holidayOverrides[key].end=e.target.value; };
        editorRow.appendChild(endLabel); editorRow.appendChild(endInput);
      }
      const toggleBtn = document.createElement('button');
      toggleBtn.className = 'range-toggle'; toggleBtn.textContent = isRange ? 'Single day' : '+ Date range';
      toggleBtn.onclick = e => {
        e.stopPropagation();
        if (!holidayOverrides[key]) holidayOverrides[key]={start:startVal};
        holidayOverrides[key].isRange = !isRange;
        if (!isRange) holidayOverrides[key].end='';
        renderHolidays();
      };
      editorRow.appendChild(toggleBtn); editor.appendChild(editorRow);
    }
    item.appendChild(row); item.appendChild(editor); list.appendChild(item);
  });
  updateCount();
}

function updateCount() { document.getElementById('countBadge').textContent = selectedHolidays.size + ' selected'; }

function selectAll() {
  getAllHolidays().forEach(h => selectedHolidays.add(getHolidayKey(h)));
  renderHolidays();
}
function clearAll() { selectedHolidays.clear(); renderHolidays(); }

function addCustom() {
  const name = document.getElementById('customName').value.trim();
  const dateVal = document.getElementById('customDate').value;
  if (!name || !dateVal) return;
  const [y, m, d] = dateVal.split('-').map(Number);
  const month = m - 1;
  const mn = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const dt = new Date(y, month, d);
  const dateLabel = `${days[dt.getDay()]} ${d} ${mn[month]} ${y}`;
  customHolidays.push({ month, name, date: dateLabel, iso: dateVal, custom: true });
  document.getElementById('customName').value=''; document.getElementById('customDate').value='';
  renderHolidays();
}

// Uses local date parsing to avoid UTC timezone shift
function parseISO(iso) {
  const [y, m, d] = iso.split('-').map(Number);
  return new Date(y, m-1, d);
}

function prevWorkingDay(iso) {
  const active = getActiveDays();
  const d = parseISO(iso);
  d.setDate(d.getDate()-1);
  while (!active.includes((d.getDay()+6)%7)) d.setDate(d.getDate()-1);
  return d;
}
function nextWorkingDay(iso) {
  const active = getActiveDays();
  const d = parseISO(iso);
  d.setDate(d.getDate()+1);
  while (!active.includes((d.getDay()+6)%7)) d.setDate(d.getDate()+1);
  return d;
}
function fmtDate(d) {
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]}`;
}

function generate() {
  const allHolidays = getAllHolidays();
  const selected = allHolidays.filter(h => selectedHolidays.has(getHolidayKey(h)));
  if (selected.length===0) { document.getElementById('output').innerHTML='<span class="empty-state">No holidays selected.</span>'; return; }
  if (getActiveDays().length===0) { document.getElementById('output').innerHTML='<span class="empty-state">No working days selected.</span>'; return; }

  const lines=[], warnings=[];
  selected.forEach(h => {
    const key=getHolidayKey(h), override=holidayOverrides[key]||{};
    const startIso = override.start || h.iso;
    const endIso = override.isRange ? (override.end||null) : null;
    if (!startIso) { warnings.push(h.name); lines.push(`${h.name}: [date needed — please enter manually]`); return; }
    const uploadDay=prevWorkingDay(startIso), revertDay=nextWorkingDay(endIso||startIso);
    const ui=(uploadDay.getDay()+6)%7, ri=(revertDay.getDay()+6)%7;
    lines.push(`${h.name}: upload ${fmtDate(uploadDay)} at ${getCloseForDay(ui)} ; play 24/7 ; revert ${fmtDate(revertDay)} at ${getOpenForDay(ri)}`);
  });

  const out = document.getElementById('output');
  out.textContent = lines.join('\n');
  if (warnings.length) {
    const note=document.createElement('div');
    note.className='warning-note';
    note.textContent='Flagged for manual review: '+warnings.join(', ');
    out.appendChild(note);
  }
}

function copyOutput() {
  const text = document.getElementById('output').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btns = document.querySelectorAll('.btn-row .btn');
    btns.forEach(b => { if (b.textContent.includes('Copy')) { b.textContent='Copied!'; setTimeout(()=>b.textContent='Copy to clipboard',1500); }});
  });
}

initDays();
renderHolidays();
</script>
